<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Service Dashboard – CV (Live)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" crossorigin="anonymous"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f7fa;
    color: #1f2330;
    font-size: 14px;
  }
  .wrap { padding: 18px 20px 40px; max-width: 1400px; margin: 0 auto; }
  header.top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  header.top h1 {
    margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
  }
  header.top .sub { color: #6b7280; font-size: 12px; margin-top: 2px; }
  .status {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; border: 1px solid #e5e7eb;
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; color: #374151;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; }
  .dot.live { background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.18); }
  .dot.err  { background: #ef4444; }

  button.btn {
    background:#111827; color:#fff; border:0; border-radius:8px;
    padding:7px 12px; font-size:12px; cursor:pointer;
  }
  button.btn.alt { background:#6b7280; }
  button.btn:hover { filter: brightness(0.9); }

  .grid { display: grid; gap: 14px; grid-template-columns: repeat(12, 1fr); }
  .card {
    background:#fff; border:1px solid #e5e7eb; border-radius:12px;
    padding:14px 16px; box-shadow:0 1px 2px rgba(15,23,42,.04);
  }
  .card h2 {
    margin: 0 0 10px;
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; color: #4b5563;
  }
  .c-4{grid-column:span 4}.c-6{grid-column:span 6}.c-8{grid-column:span 8}.c-12{grid-column:span 12}
  @media (max-width: 980px){ .c-4,.c-6,.c-8{grid-column:span 12} }

  table.t {
    width:100%; border-collapse:collapse; font-size:12.5px;
  }
  table.t th, table.t td {
    padding:7px 9px; border-bottom:1px solid #eef0f3; text-align:right;
    vertical-align: middle;
  }
  table.t th:first-child, table.t td:first-child { text-align:left; }
  table.t th {
    background:#f9fafb; color:#374151;
    font-weight:600; font-size:11.5px; letter-spacing:.02em;
    text-transform:uppercase;
  }
  table.t tr:hover td { background:#fafafa; }
  table.t tr.total td { font-weight:700; background:#f3f4f6; }

  .chart-wrap { position: relative; height: 220px; margin-top: 12px; }

  .err {
    background:#fef2f2; color:#991b1b; padding:10px 12px;
    border:1px solid #fecaca; border-radius:8px; font-size:12.5px;
  }
  .muted { color:#6b7280; } .small{ font-size:11px; }

  /* Password gate */
  #gate {
    position:fixed; inset:0; z-index:9999;
    background: linear-gradient(180deg,#eef2ff,#f5f7fa);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  #gate .panel {
    background:#fff; border:1px solid #e5e7eb; border-radius:14px;
    padding:24px 26px; max-width:380px; width:100%;
    box-shadow:0 8px 24px rgba(15,23,42,.10);
  }
  #gate h2 { margin:0 0 4px; font-size:18px; color:#111827; }
  #gate p { margin:0 0 16px; font-size:12.5px; color:#6b7280; }
  #gate label { display:block; font-size:12px; color:#4b5563; margin-bottom:6px; }
  #gate input[type="password"] {
    width:100%; padding:10px 12px; font-size:14px;
    border:1px solid #d1d5db; border-radius:8px; outline:none;
  }
  #gate input[type="password"]:focus {
    border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,.15);
  }
  #gate button {
    margin-top:12px; width:100%;
    background:#4f46e5; color:#fff; border:0; border-radius:8px;
    padding:10px 12px; font-size:13.5px; font-weight:600; cursor:pointer;
  }
  #gate button:hover { background:#4338ca; }
  #gate .pwerr {
    margin-top:10px; padding:8px 10px; border:1px solid #fecaca;
    background:#fef2f2; color:#991b1b; border-radius:8px; font-size:12px;
    display:none;
  }
  #gate .pwerr.show { display:block; }
  body.locked { overflow:hidden; }
</style>
</head>
<body class="locked">

<div id="gate">
  <div class="panel">
    <h2>Service Dashboard – CV</h2>
    <p>Enter the password to continue.</p>
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus />
    <button id="pwbtn" type="button">Unlock</button>
    <div class="pwerr" id="pwerr">Incorrect password.</div>
  </div>
</div>

<div class="wrap" id="wrap" style="display:none">
  <header class="top">
    <div>
      <h1>Service Dashboard – CV</h1>
      <div class="sub" id="subline">Live view · pulls the published Summary CSV on every reload</div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <div class="status" id="status">
        <span class="dot" id="dot"></span>
        <span id="statusText">Loading…</span>
      </div>
      <button class="btn" onclick="load()">Refresh</button>
    </div>
  </header>

  <div id="error-area"></div>
  <div class="grid" id="grid"></div>
  <p class="muted small" style="margin-top:18px">Source: Google Sheet "Service Dashboard- CV" — published CSV. Google caches the CSV for ~5 minutes after edits.</p>
</div>

<script>
//------------------------------------------------------------------
// Config
//------------------------------------------------------------------
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4D4j-DeM2jbb6ZBnQlW2ZMOhQ5T98BCSGgmjShG0-vH70FVNNayB7SLPefPcOVpWYjEoPAPl1Etqd/pub?output=csv";

// SHA-256 of password "Service2026" (change instructions below)
const PASSWORD_HASH = "d80b4895f9b404965bb35e940f8dad87c96259a6e77dc4a46c389dcfbac4630f";

//------------------------------------------------------------------
// Password gate
//------------------------------------------------------------------
async function sha256(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
async function tryUnlock(){
  const pw  = document.getElementById("pw").value;
  const err = document.getElementById("pwerr");
  if (await sha256(pw) === PASSWORD_HASH){
    document.getElementById("gate").remove();
    document.getElementById("wrap").style.display = "";
    document.body.classList.remove("locked");
    try { sessionStorage.setItem("svc_dash_ok","1"); } catch(_){}
    load();
  } else {
    err.classList.add("show");
    document.getElementById("pw").select();
  }
}
document.addEventListener("DOMContentLoaded", () => {
  try {
    if (sessionStorage.getItem("svc_dash_ok") === "1"){
      document.getElementById("gate").remove();
      document.getElementById("wrap").style.display = "";
      document.body.classList.remove("locked");
      load();
      return;
    }
  } catch(_){}
  document.getElementById("pwbtn").addEventListener("click", tryUnlock);
  document.getElementById("pw").addEventListener("keydown", e => {
    if (e.key === "Enter") tryUnlock();
    else document.getElementById("pwerr").classList.remove("show");
  });
});

//------------------------------------------------------------------
// Helpers
//------------------------------------------------------------------
function setStatus(state, text){
  const dot = document.getElementById("dot");
  document.getElementById("statusText").textContent = text;
  dot.className = "dot " + (state==="ok"?"live":state==="err"?"err":"");
}
function showError(msg){
  document.getElementById("error-area").innerHTML =
    `<div class="err" style="margin-bottom:14px">${msg}</div>`;
}
function clearError(){ document.getElementById("error-area").innerHTML = ""; }
const escHtml = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
function isNumericString(s){
  if (s === null || s === undefined) return false;
  const t = String(s).replace(/[, %]/g,'').trim();
  if (t === "") return false;
  return /^-?\d+(\.\d+)?$/.test(t);
}
function toNum(s){
  const t = String(s||"").replace(/[, %]/g,'').trim();
  const n = Number(t);
  return isNaN(n) ? 0 : n;
}
function fmt(v){
  if (v === null || v === undefined || v === "") return "";
  const s = String(v).trim();
  if (isNumericString(s)){
    const n = Number(s.replace(/,/g,''));
    if (Math.abs(n) >= 1000) return n.toLocaleString(undefined, {maximumFractionDigits: 2});
    if (!Number.isInteger(n))  return n.toFixed(2);
    return n.toLocaleString();
  }
  return s;
}

// RFC-4180 CSV parser
function parseCSV(text){
  const rows = []; let row = []; let cell = ""; let inQ = false;
  for (let i=0; i<text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"'){ if (text[i+1] === '"'){ cell += '"'; i++; } else inQ = false; }
      else cell += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ','){ row.push(cell); cell = ""; }
      else if (c === '\n'){ row.push(cell); rows.push(row); row = []; cell = ""; }
      else if (c === '\r'){ /* skip */ }
      else cell += c;
    }
  }
  if (cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows.map(r => r.map(c => c.trim()));
}

// Trim trailing empty columns globally
function tidy(rows){
  let maxLen = 0;
  for (const r of rows){
    for (let i = r.length - 1; i >= 0; i--){
      if (r[i] !== ""){ if (i + 1 > maxLen) maxLen = i + 1; break; }
    }
  }
  return rows.map(r => r.slice(0, maxLen));
}

// Split into blocks separated by fully-empty rows
function splitBlocks(rows){
  const blocks = [];
  let cur = [];
  const empty = r => r.every(c => c === "");
  for (const r of rows){
    if (empty(r)){ if (cur.length){ blocks.push(cur); cur = []; } }
    else cur.push(r);
  }
  if (cur.length) blocks.push(cur);

  // Clean each block: drop leading columns that are empty across the whole block,
  // pick header = first row, data = rest
  return blocks.map(block => {
    // Drop shared empty leading columns
    let lead = 0;
    while (lead < (block[0]?.length || 0) &&
           block.every(r => (r[lead] ?? "") === "")) lead++;
    const cleaned = block.map(r => r.slice(lead));
    // Drop shared empty trailing columns
    let trail = cleaned[0].length;
    while (trail > 0 && cleaned.every(r => (r[trail-1] ?? "") === "")) trail--;
    const trimmed = cleaned.map(r => r.slice(0, trail));
    return { header: trimmed[0] || [], rows: trimmed.slice(1) };
  }).filter(b => b.header.length > 0 && b.rows.length > 0);
}

// Try to give the block a friendly title from header[0] or the first cell that looks like a heading
function blockTitle(block, idx){
  // If header[0] is text and other headers look like real column names, use header[0] as title
  const h0 = block.header[0] || "";
  const restNumeric = block.header.slice(1).every(h => h && !isNumericString(h));
  // If first row first cell is something like "1. Inbound Out Bound", strip the numbering
  let title = h0.replace(/^\s*\d+\.\s*/,'').trim();
  if (!title){
    // No header label — synthesize one from the first column entries
    const firstCol = block.rows.map(r => r[0]).filter(Boolean).slice(0,3).join(", ");
    title = firstCol || `Section ${idx+1}`;
  }
  return title;
}

//------------------------------------------------------------------
// Block renderer
//------------------------------------------------------------------
function renderBlockTable(block){
  // If the "header" has all-blank cells except the first (e.g. a title row),
  // promote the second row to header.
  let header = block.header.slice();
  let rows = block.rows.slice();
  const blankInHeader = header.filter(h => h === "" || h === undefined).length;
  if (blankInHeader >= header.length - 1 && rows.length > 0){
    header = rows[0].slice();
    rows = rows.slice(1);
  }

  const totalRowIdx = rows.findIndex(r => /grand total|^total$/i.test(r[0] || ""));

  return `
    <table class="t">
      <thead><tr>${header.map(h => `<th>${escHtml(h || "")}</th>`).join("")}</tr></thead>
      <tbody>
        ${rows.map((r, i) => {
          const total = i === totalRowIdx;
          return `<tr class="${total?'total':''}">${r.map((c, j) =>
            `<td>${j === 0 ? escHtml(c) : escHtml(fmt(c))}</td>`).join("")}</tr>`;
        }).join("")}
      </tbody>
    </table>`;
}

function chartFromBlock(block, canvasId){
  // Build a simple bar chart from the block:
  //   x-axis labels = first column values (excluding total)
  //   one dataset per numeric column (header[1..])
  let header = block.header.slice();
  let rows = block.rows.slice();
  const blankInHeader = header.filter(h => h === "" || h === undefined).length;
  if (blankInHeader >= header.length - 1 && rows.length > 0){
    header = rows[0].slice();
    rows = rows.slice(1);
  }
  // Exclude grand-total row
  rows = rows.filter(r => !/grand total|^total$/i.test(r[0] || ""));

  if (header.length < 2 || rows.length < 1) return false;

  // Which columns are numeric (>= half the cells are numbers)?
  const colNumeric = [];
  for (let c = 1; c < header.length; c++){
    let n = 0, t = 0;
    for (const r of rows){ if ((r[c] ?? "") !== ""){ t++; if (isNumericString(r[c])) n++; } }
    if (t >= 1 && n / t >= 0.6) colNumeric.push(c);
  }
  if (!colNumeric.length) return false;

  // Don't chart if all rows have the same label and there's only one numeric column
  const labels = rows.map(r => r[0] || "");
  if (labels.every(l => !l)) return false;

  const palette = ["#6366f1","#22c55e","#06b6d4","#f59e0b","#ef4444","#a855f7","#14b8a6","#eab308"];
  const datasets = colNumeric.map((c, idx) => ({
    label: header[c] || `Col ${c}`,
    data: rows.map(r => toNum(r[c])),
    backgroundColor: palette[idx % palette.length],
  }));

  const ctx = document.getElementById(canvasId);
  if (!ctx) return false;
  if (window._charts && window._charts[canvasId]) window._charts[canvasId].destroy();
  window._charts = window._charts || {};
  window._charts[canvasId] = new Chart(ctx, {
    type: "bar",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 11 } } } },
      scales: {
        x: { ticks: { font: { size: 10 } } },
        y: { beginAtZero: true, ticks: { font: { size: 10 } } },
      },
    },
  });
  return true;
}

// Decide how many columns this card should span based on block width
function blockSpan(block){
  const cols = block.header.length;
  const rows = block.rows.length;
  // Wide blocks (5+ cols) or long blocks (>8 rows) get the whole row
  if (cols >= 5 || rows >= 8) return 12;
  // Mid blocks
  if (cols >= 4) return 8;
  if (cols >= 3) return 6;
  return 4;
}

//------------------------------------------------------------------
// Main
//------------------------------------------------------------------
async function load(){
  clearError();
  setStatus("loading", "Fetching live data…");
  document.getElementById("grid").innerHTML = "";
  try {
    const url = CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "_=" + Date.now();
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const text = await r.text();
    if (!text || text.trim().length < 5){
      throw new Error("Empty response from Google Sheets — is the sheet still published?");
    }

    const rows = tidy(parseCSV(text));
    const blocks = splitBlocks(rows);

    if (!blocks.length){
      showError("CSV loaded but no data blocks detected. Make sure the Summary sheet is the published tab.");
      setStatus("err", "No data blocks");
      return;
    }

    const grid = document.getElementById("grid");
    blocks.forEach((block, idx) => {
      const span = blockSpan(block);
      const id = "ch-" + idx;
      const title = blockTitle(block, idx);
      const canChart = block.rows.length >= 2 &&
                       block.header.length >= 2 &&
                       block.header.some((h, i) => i > 0 && h);
      const html = `
        <section class="card c-${span}">
          <h2>${escHtml(title)}</h2>
          ${renderBlockTable(block)}
          ${canChart ? `<div class="chart-wrap"><canvas id="${id}"></canvas></div>` : ""}
        </section>`;
      grid.insertAdjacentHTML("beforeend", html);
      if (canChart) chartFromBlock(block, id);
    });

    document.getElementById("subline").textContent =
      `Live view · ${blocks.length} section(s) · last refreshed ${new Date().toLocaleString()}`;
    setStatus("ok", "Live");
  } catch (err){
    console.error(err);
    setStatus("err", "Failed to load");
    showError(
      `Could not load the CSV. <b>${escHtml(err && err.message || err)}</b><br><br>
       Common fixes:
       <ul>
         <li>In Google Sheets: <i>File → Share → Publish to web</i> → pick the <b>Summary</b> tab → click <b>Publish</b>.</li>
         <li>Republish if you've edited the sheet recently — Google caches the CSV for ~5 minutes.</li>
         <li>If you opened this file with a <code>file://</code> URL the browser may block <code>fetch()</code>. Open via Cloudflare Pages or a local server.</li>
       </ul>`
    );
  }
}
</script>
</body>
</html>
